---
- hosts: "*"
  remote_user: root
  tasks:
  - name: ensure packages are installed
    apt:
      name:
      - build-essential
      - cmake
      - ctags
      - curl
      - git
      - gnome-tweak-tool
      - kitty
      - net-tools
      - python-dev
      - python-pip
      - python-virtualenv
      - python3-dev
      - python3-pip
      - python3-venv
      - ruby-dev
      - shellcheck
      - tmux
      - vim-nox
      - xclip
      - zsh
      update_cache: yes
      state: latest
